services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mailgun_proxy}
      DB_USERNAME: ${DB_USERNAME:-mailgun_proxy}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - data:/data
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mailgun_proxy}
      MYSQL_USER: ${DB_USERNAME:-mailgun_proxy}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  data:
  mysql:
